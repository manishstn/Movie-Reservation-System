# ==========================================
# application-dev.properties (Docker Environment)
# ==========================================

# Run Dev environment on 8081 so it doesn't conflict with your IDE
server.port=8081

# ------------------------------------------
# Database (Connecting via Docker Network)
# ------------------------------------------
spring.datasource.url=jdbc:postgresql://postgres:5432/movie_reservation_db
spring.datasource.username=movie_user
spring.datasource.password=secretpassword

# ------------------------------------------
# Infrastructure (Connecting via Docker Network)
# ------------------------------------------
spring.data.redis.host=redis
spring.data.redis.port=6379

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=adminpass

aws.s3.endpoint=http://minio:9000
aws.s3.access-key=admin_user
aws.s3.secret-key=admin_password

# ------------------------------------------
# Google OAuth2 (Injected via Docker)
# ------------------------------------------
# These pull securely from the environment variables in docker-compose.yml
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ------------------------------------------
# Debugging
# ------------------------------------------
# Turn off SQL logging in the Docker environment to save log space
spring.jpa.show-sql=false