# ==========================================
# application-local.properties (Developer IDE)
# ==========================================

# Run local IDE development on standard port
server.port=8080

# ------------------------------------------
# Database (Connecting via Localhost)
# ------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_reservation_db
spring.datasource.username=postgres
spring.datasource.password=root

# ------------------------------------------
# Infrastructure (Connecting via Localhost)
# ------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=adminpass

aws.s3.endpoint=http://localhost:9000
aws.s3.access-key=admin_user
aws.s3.secret-key=admin_password

# ------------------------------------------
# Google OAuth2 (Local Credentials)
# ------------------------------------------
spring.security.oauth2.client.registration.google.client-id=your-local-google-client-id
spring.security.oauth2.client.registration.google.client-secret=your-local-google-client-secret

# ------------------------------------------
# Debugging
# ------------------------------------------
# Turn on SQL logging so you can see what Hibernate is doing while you code
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true