spring.application.name=Movie-Reservation-System

# JPA & Flyway Defaults
spring.jpa.hibernate.ddl-auto=none
# REMOVED: spring.jpa.properties.hibernate.dialect (Let Hibernate auto-detect)

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# ADDED: Explicitly tell Flyway where to look for your SQL files
spring.flyway.locations=classpath:db/migration

# Security Scope
spring.security.oauth2.client.registration.google.scope=email,profile

# Default Active Profile
spring.profiles.active=local

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha

# Ensure Swagger doesn't crash if you have no controllers yet
springdoc.api-docs.enabled=true

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.authentication.dao.DaoAuthenticationProvider=DEBUG
